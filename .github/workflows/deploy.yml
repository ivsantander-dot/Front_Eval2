name: Deploy Frontend

on:
  push:
    branches: [ deploy ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y push imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ivsantander/frontend:latest

      - name: Deploy en EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ivsantander/frontend:latest
            docker stop frontend || true
            docker rm frontend || true
            docker run -d --restart always --name frontend -p 5000:5000 -e DEBUG=False -e SECRET_KEY=clave_secreta_123 -e BACKEND_URL=http://ip-10-0-128-169.ec2.internal:3000 ivsantander/frontend:latest